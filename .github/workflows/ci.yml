name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
      web_changed: ${{ steps.filter.outputs.web }}
      rust_changed: ${{ steps.filter.outputs.rust }}
      tauri_changed: ${{ steps.filter.outputs.tauri }}
      code_changed: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs_only:
              - '**/*.md'
            web:
              - 'apps/web/**'
              - 'features/**'
              - 'packages/shared-types/**'
              - 'packages/shared-ui/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            rust:
              - 'infra/tauri/**'
              - 'packages/bee-*/**'
            tauri:
              - 'infra/tauri/**'
              - 'apps/web/**'
              - 'packages/shared-types/**'
              - 'packages/shared-ui/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            code:
              - 'apps/**'
              - 'features/**'
              - 'infra/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

  policy-guard:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enforce blocked patterns on changed files
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            BASE_SHA="${PR_BASE_SHA}"
          elif [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            BASE_SHA="$(git rev-parse "${HEAD_SHA}^" 2>/dev/null || true)"
          else
            BASE_SHA="${PUSH_BEFORE_SHA}"
          fi

          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="${HEAD_SHA}"
          fi

          mapfile -t changed_files < <(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" -- \
            'apps/**' 'features/**' 'infra/**' 'packages/**' '*.ts' '*.tsx' '*.js' '*.jsx' '*.rs')

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "No code changes detected for policy guard."
            exit 0
          fi

          blocked=0
          for file in "${changed_files[@]}"; do
            if [[ ! -f "${file}" ]]; then
              continue
            fi

            if [[ "${file}" =~ (^|/)tests?/ ]] || [[ "${file}" =~ \.test\.(ts|tsx|js|jsx)$ ]] || [[ "${file}" =~ \.spec\.(ts|tsx|js|jsx)$ ]]; then
              continue
            fi

            case "${file}" in
              *.ts|*.tsx|*.js|*.jsx)
                if grep -nE '\bas any\b|@ts-ignore|console\.log\(' "${file}"; then
                  echo "Blocked TypeScript/JavaScript pattern found in ${file}"
                  blocked=1
                fi
                ;;
              *.rs)
                if grep -nE '\.unwrap\(' "${file}"; then
                  echo "Blocked Rust pattern found in ${file}"
                  blocked=1
                fi
                ;;
            esac
          done

          if [ "${blocked}" -ne 0 ]; then
            echo "Policy guard failed."
            exit 1
          fi

          echo "Policy guard passed."

  web-quality:
    needs: [changes, policy-guard]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm --filter @hivelaunch/web test:run
      - run: pnpm --filter @hivelaunch/web build

  rust-quality:
    needs: [changes, policy-guard]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust_changed == 'true' || needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev
      - run: cargo check --manifest-path infra/tauri/Cargo.toml
      - run: cargo test --manifest-path infra/tauri/Cargo.toml
      - run: cargo build --manifest-path infra/tauri/Cargo.toml --bin http-server

  desktop-smoke:
    needs: [changes, policy-guard]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.tauri_changed == 'true'
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build --debug --config infra/tauri/tauri.conf.json
