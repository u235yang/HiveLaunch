name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag like v0.1.0
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

  build-web:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @hivelaunch/web build
      - uses: actions/upload-artifact@v4
        with:
          name: web-${{ needs.prepare.outputs.tag }}
          path: apps/web/.next

  build-api:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --manifest-path infra/tauri/Cargo.toml --bin http-server
      - uses: actions/upload-artifact@v4
        if: runner.os != 'Windows'
        with:
          name: http-server-${{ matrix.os }}-${{ needs.prepare.outputs.tag }}
          path: infra/tauri/target/release/http-server
      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: http-server-${{ matrix.os }}-${{ needs.prepare.outputs.tag }}
          path: infra/tauri/target/release/http-server.exe

  build-desktop:
    needs: prepare
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build --config infra/tauri/tauri.conf.json
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-${{ needs.prepare.outputs.tag }}
          path: |
            infra/tauri/target/release/bundle
            infra/tauri/target/release/*.dmg
            infra/tauri/target/release/*.app

  publish-release:
    needs: [prepare, build-web, build-api, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            artifacts/**/*
