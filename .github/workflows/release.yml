name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag like v0.1.0
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      prerelease: ${{ steps.vars.outputs.prerelease }}
      release_name: ${{ steps.vars.outputs.release_name }}
    steps:
      - id: vars
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ "$tag" == *beta* ]]; then
            prerelease=true
            release_name="HiveLaunch Beta ${tag}"
          else
            prerelease=false
            release_name="HiveLaunch ${tag}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"

  build-web:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @hivelaunch/web exec node scripts/static-export-build.cjs
      - uses: actions/upload-artifact@v4
        with:
          name: web-static-${{ needs.prepare.outputs.tag }}
          path: apps/web/out
          if-no-files-found: error

  build-api:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: cargo build --release --manifest-path infra/tauri/Cargo.toml --bin http-server
      - name: Prepare non-Windows API artifact
        if: runner.os == 'Linux'
        run: |
          mkdir -p infra/tauri/target/release/dist
          cp infra/tauri/target/release/http-server infra/tauri/target/release/dist/hivelaunch-api-linux
      - name: Prepare macOS API artifact
        if: runner.os == 'macOS'
        run: |
          mkdir -p infra/tauri/target/release/dist
          cp infra/tauri/target/release/http-server infra/tauri/target/release/dist/hivelaunch-api-macos
      - name: Prepare Windows API artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path infra/tauri/target/release/dist | Out-Null
          Copy-Item infra/tauri/target/release/http-server.exe infra/tauri/target/release/dist/hivelaunch-api-windows.exe
      - uses: actions/upload-artifact@v4
        if: runner.os == 'Linux'
        with:
          name: api-linux-${{ needs.prepare.outputs.tag }}
          path: infra/tauri/target/release/dist/hivelaunch-api-linux
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        if: runner.os == 'macOS'
        with:
          name: api-macos-${{ needs.prepare.outputs.tag }}
          path: infra/tauri/target/release/dist/hivelaunch-api-macos
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: api-windows-${{ needs.prepare.outputs.tag }}
          path: infra/tauri/target/release/dist/hivelaunch-api-windows.exe
          if-no-files-found: error

  build-desktop:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: pnpm install --frozen-lockfile
      - name: Build desktop bundle for Linux
        if: runner.os == 'Linux'
        run: |
          cd infra/tauri
          pnpm tauri build --config tauri.conf.json --bundles deb,appimage
      - name: Build desktop bundle for macOS
        if: runner.os == 'macOS'
        run: |
          cd infra/tauri
          pnpm tauri build --config tauri.conf.json --bundles dmg,app
      - name: Build desktop bundle for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location infra/tauri
          pnpm tauri build --config tauri.conf.json --bundles msi,nsis
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}-${{ needs.prepare.outputs.tag }}
          path: |
            infra/tauri/target/release/bundle
          if-no-files-found: error

  build-mobile-android:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
      - uses: android-actions/setup-android@v3
      - name: Build Android release
        run: |
          cd apps/mobile
          rm -rf src-tauri/gen/android
          pnpm exec tauri android init
          pnpm exec tauri android build --debug --ci
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-android-${{ needs.prepare.outputs.tag }}
          path: |
            apps/mobile/src-tauri/gen/android/**/build/outputs/**/*.apk
            apps/mobile/src-tauri/gen/android/**/build/outputs/**/*.aab
            apps/mobile/android/**/build/outputs/**/*.apk
            apps/mobile/android/**/build/outputs/**/*.aab
          if-no-files-found: error

  build-mobile-ios:
    needs: prepare
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios
      - name: Build iOS release
        run: |
          cd apps/mobile
          rm -rf src-tauri/gen/apple
          pnpm exec tauri ios init
          pnpm exec tauri ios build --debug --target aarch64-sim --ci
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-ios-${{ needs.prepare.outputs.tag }}
          path: |
            apps/mobile/src-tauri/gen/apple/**/build/**
            apps/mobile/ios/build
          if-no-files-found: error

  publish-release:
    needs: [prepare, build-web, build-api, build-desktop, build-mobile-android, build-mobile-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.tag }}"
          mkdir -p release-assets

          cp "artifacts/api-linux-${TAG}/hivelaunch-api-linux" "release-assets/hivelaunch-api-linux-${TAG}"
          cp "artifacts/api-macos-${TAG}/hivelaunch-api-macos" "release-assets/hivelaunch-api-macos-${TAG}"
          cp "artifacts/api-windows-${TAG}/hivelaunch-api-windows.exe" "release-assets/hivelaunch-api-windows-${TAG}.exe"

          WEB_ENTRY="$(find "artifacts/web-static-${TAG}" -type f -name 'index.html' | head -n 1)"
          test -n "${WEB_ENTRY}"
          cp "${WEB_ENTRY}" "release-assets/hivelaunch-web-${TAG}.html"

          LINUX_DESKTOP="$(find "artifacts/desktop-ubuntu-latest-${TAG}" -type f \( -name '*.AppImage' -o -name '*.deb' \) | sort | head -n 1)"
          MACOS_DESKTOP="$(find "artifacts/desktop-macos-latest-${TAG}" -type f \( -name '*.dmg' -o -name '*.app.tar.gz' \) | sort | head -n 1)"
          WINDOWS_DESKTOP="$(find "artifacts/desktop-windows-latest-${TAG}" -type f \( -name '*.exe' -o -name '*.msi' \) | sort | head -n 1)"
          ANDROID_MOBILE="$(find "artifacts/mobile-android-${TAG}" -type f \( -name '*.apk' -o -name '*.aab' \) | sort | head -n 1)"
          IOS_MOBILE_IPA="$(find "artifacts/mobile-ios-${TAG}" -type f -name '*.ipa' | sort | head -n 1)"
          IOS_MOBILE_XCARCHIVE="$(find "artifacts/mobile-ios-${TAG}" -type d -name '*.xcarchive' | sort | head -n 1)"

          test -n "${LINUX_DESKTOP}"
          test -n "${MACOS_DESKTOP}"
          test -n "${WINDOWS_DESKTOP}"
          test -n "${ANDROID_MOBILE}"
          if [[ -z "${IOS_MOBILE_IPA}" && -z "${IOS_MOBILE_XCARCHIVE}" ]]; then
            echo "No iOS IPA or XCARCHIVE artifact found"
            exit 1
          fi

          if [[ "${LINUX_DESKTOP}" == *.deb ]]; then
            cp "${LINUX_DESKTOP}" "release-assets/hivelaunch-desktop-linux-${TAG}.deb"
          else
            cp "${LINUX_DESKTOP}" "release-assets/hivelaunch-desktop-linux-${TAG}.AppImage"
          fi

          if [[ "${MACOS_DESKTOP}" == *.dmg ]]; then
            cp "${MACOS_DESKTOP}" "release-assets/hivelaunch-desktop-macos-${TAG}.dmg"
          else
            cp "${MACOS_DESKTOP}" "release-assets/hivelaunch-desktop-macos-${TAG}.app.tar.gz"
          fi

          if [[ "${WINDOWS_DESKTOP}" == *.msi ]]; then
            cp "${WINDOWS_DESKTOP}" "release-assets/hivelaunch-desktop-windows-${TAG}.msi"
          else
            cp "${WINDOWS_DESKTOP}" "release-assets/hivelaunch-desktop-windows-${TAG}.exe"
          fi

          if [[ "${ANDROID_MOBILE}" == *.aab ]]; then
            cp "${ANDROID_MOBILE}" "release-assets/hivelaunch-mobile-android-${TAG}.aab"
          else
            cp "${ANDROID_MOBILE}" "release-assets/hivelaunch-mobile-android-${TAG}.apk"
          fi

          if [[ -n "${IOS_MOBILE_IPA}" ]]; then
            cp "${IOS_MOBILE_IPA}" "release-assets/hivelaunch-mobile-ios-${TAG}.ipa"
          else
            ditto -c -k --sequesterRsrc --keepParent "${IOS_MOBILE_XCARCHIVE}" "release-assets/hivelaunch-mobile-ios-dev-unsigned-${TAG}.xcarchive.zip"
          fi

          ls -la release-assets
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.prepare.outputs.release_name }}
          tag_name: ${{ needs.prepare.outputs.tag }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            release-assets/*
