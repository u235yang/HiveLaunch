name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Deploy target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      git_ref:
        description: Branch, tag, or commit SHA
        required: true
        default: main
        type: string

concurrency:
  group: manual-deploy-${{ inputs.target_environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm --filter @hivelaunch/web test:run
      - run: pnpm --filter @hivelaunch/web build
      - run: cargo check --manifest-path infra/tauri/Cargo.toml
      - run: cargo test --manifest-path infra/tauri/Cargo.toml

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    steps:
      - run: echo "Deploying ${{ inputs.git_ref }} to ${{ inputs.target_environment }}"
