name: Mobile CI/CD

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-ci-cd.yml'
  push:
    branches: [dev, main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-ci-cd.yml'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag like v0.1.0-rc.1
        required: false
        type: string
      target_platform:
        description: Mobile release target
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_mobile: ${{ steps.detect.outputs.has_mobile }}
      node_mobile: ${{ steps.detect.outputs.node_mobile }}
      flutter_mobile: ${{ steps.detect.outputs.flutter_mobile }}
      has_android: ${{ steps.detect.outputs.has_android }}
      has_ios: ${{ steps.detect.outputs.has_ios }}
      release_tag: ${{ steps.detect.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          if [ -d "apps/mobile" ]; then
            echo "has_mobile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_mobile=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f "apps/mobile/package.json" ]; then
            echo "node_mobile=true" >> "$GITHUB_OUTPUT"
          else
            echo "node_mobile=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f "apps/mobile/pubspec.yaml" ]; then
            echo "flutter_mobile=true" >> "$GITHUB_OUTPUT"
          else
            echo "flutter_mobile=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f "apps/mobile/android/gradlew" ]; then
            echo "has_android=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_android=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -d "apps/mobile/ios" ]; then
            echo "has_ios=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_ios=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_tag }}" ]; then
            echo "release_tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=" >> "$GITHUB_OUTPUT"
          fi

  mobile-quality-node:
    needs: detect
    if: needs.detect.outputs.node_mobile == 'true' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run mobile lint when configured
        run: |
          if node -e "const p=require('./apps/mobile/package.json');process.exit((p.scripts&&p.scripts.lint)?0:1)"; then
            pnpm --dir apps/mobile lint
          else
            echo "lint script not found in apps/mobile/package.json, skipped"
          fi
      - name: Run mobile typecheck when configured
        run: |
          if node -e "const p=require('./apps/mobile/package.json');process.exit((p.scripts&&p.scripts.typecheck)?0:1)"; then
            pnpm --dir apps/mobile typecheck
          else
            echo "typecheck script not found in apps/mobile/package.json, skipped"
          fi
      - name: Run mobile test when configured
        run: |
          if node -e "const p=require('./apps/mobile/package.json');process.exit((p.scripts&&(p.scripts['test:run']||p.scripts.test))?0:1)"; then
            if node -e "const p=require('./apps/mobile/package.json');process.exit((p.scripts&&p.scripts['test:run'])?0:1)"; then
              pnpm --dir apps/mobile test:run
            else
              pnpm --dir apps/mobile test -- --ci
            fi
          else
            echo "test script not found in apps/mobile/package.json, skipped"
          fi

  mobile-quality-flutter:
    needs: detect
    if: needs.detect.outputs.flutter_mobile == 'true' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter pub get
        working-directory: apps/mobile
      - run: flutter analyze
        working-directory: apps/mobile
      - run: flutter test
        working-directory: apps/mobile

  mobile-release-android:
    needs: detect
    if: needs.detect.outputs.has_android == 'true' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch') && (github.event_name != 'workflow_dispatch' || inputs.target_platform == 'all' || inputs.target_platform == 'android')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build Android release
        run: |
          chmod +x apps/mobile/android/gradlew
          ./gradlew assembleRelease
        working-directory: apps/mobile/android
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-android-${{ needs.detect.outputs.release_tag || github.sha }}
          path: apps/mobile/android/**/build/outputs/**/*.apk

  mobile-release-ios:
    needs: detect
    if: needs.detect.outputs.has_ios == 'true' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch') && (github.event_name != 'workflow_dispatch' || inputs.target_platform == 'all' || inputs.target_platform == 'ios')
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        if: needs.detect.outputs.node_mobile == 'true'
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        if: needs.detect.outputs.node_mobile == 'true'
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: needs.detect.outputs.node_mobile == 'true'
      - name: Build iOS release
        run: |
          set -euo pipefail
          cd apps/mobile/ios
          if ls *.xcworkspace >/dev/null 2>&1; then
            workspace="$(ls *.xcworkspace | head -n 1)"
            scheme="$(xcodebuild -list -workspace "$workspace" | awk '/Schemes:/{getline; gsub(/^[[:space:]]+/, "", $0); print; exit}')"
            xcodebuild -workspace "$workspace" -scheme "$scheme" -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO
          elif ls *.xcodeproj >/dev/null 2>&1; then
            project="$(ls *.xcodeproj | head -n 1)"
            scheme="$(xcodebuild -list -project "$project" | awk '/Schemes:/{getline; gsub(/^[[:space:]]+/, "", $0); print; exit}')"
            xcodebuild -project "$project" -scheme "$scheme" -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO
          else
            echo "No iOS workspace or project found"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-ios-${{ needs.detect.outputs.release_tag || github.sha }}
          path: apps/mobile/ios/build

  mobile-release-publish:
    needs: [detect, mobile-release-android, mobile-release-ios]
    if: needs.detect.outputs.release_tag != '' && (needs.detect.outputs.has_android == 'true' || needs.detect.outputs.has_ios == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: mobile-artifacts
      - name: Package mobile assets
        run: |
          mkdir -p release-assets
          for artifact_dir in mobile-artifacts/*; do
            artifact_name="$(basename "$artifact_dir")"
            tar -czf "release-assets/${artifact_name}.tar.gz" -C "$artifact_dir" .
          done
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.release_tag }}
          fail_on_unmatched_files: true
          files: |
            release-assets/*

  mobile-not-configured:
    needs: detect
    if: needs.detect.outputs.has_mobile == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: echo "apps/mobile not found, mobile CI/CD is configured and waiting for mobile project onboarding."
