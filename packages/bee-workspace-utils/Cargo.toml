[package]
name = "bee-workspace-utils"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio-util = { version = "0.7", features = ["io", "codec"] }
bytes = "1"
shlex = "1.3"
axum = { version = "0.8", features = ["ws"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
ts-rs = { git = "https://github.com/xazukx/ts-rs.git", branch = "use-ts-enum", features = ["uuid-impl", "chrono-impl", "no-serde-warnings", "serde-json-impl"] }
rust-embed = "8"
directories = "6"
open = "5"
regex = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls-webpki-roots-no-provider"] }
sentry = { version = "0.41", default-features = false, features = ["anyhow", "backtrace", "panic", "debug-images"] }
sentry-tracing = { version = "0.41", default-features = false, features = ["backtrace"] }
json-patch = "2"
jsonwebtoken = { version = "10", features = ["rust_crypto"] }
tokio = { version = "1", features = ["full"] }
futures = "0.3"
tokio-stream = { version = "0.1", features = ["sync"] }
shellexpand = "3"
which = "8"
similar = "2"
git2 = { version = "0.20", default-features = false, features = [] }
dirs = "5"
thiserror = "2"
command-group = { version = "5", features = ["with-tokio"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "uuid", "chrono", "derive"] }

[target.'cfg(unix)'.dependencies]
nix = { version = "0.29", features = ["signal", "process"] }

[target.'cfg(windows)'.dependencies]
winreg = "0.55"
windows-sys = { version = "0.61", features = ["Win32_System_Environment"] }
kill_tree = { version = "0.2", features = ["tokio"] }
