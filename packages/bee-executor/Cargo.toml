[package]
name = "bee-executor"
version = "0.1.0"
edition = "2024"

[dependencies]
bee-workspace-utils = { path = "../bee-workspace-utils" }
bee-workspace-git = { path = "../bee-workspace-git" }
tokio = { version = "1.0", features = ["full"] }
tokio-util = { version = "0.7", features = ["io", "compat", "rt"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
toml = "0.8"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
ts-rs = { git = "https://github.com/xazukx/ts-rs.git", branch = "use-ts-enum", features = ["uuid-impl", "chrono-impl", "no-serde-warnings", "serde-json-impl"] }
schemars = { version = "1.0.4", features = ["derive", "chrono04", "uuid1", "preserve_order"] }
dirs = "5"
xdg = "3"
async-trait = "0.1"
enum_dispatch = "0.3.13"
command-group = { version = "5.0", features = ["with-tokio"] }
regex = "1.11"
json-patch = "2"
thiserror = "2"
futures-io = "0.3"
tokio-stream = { version = "0.1", features = ["io-util"] }
futures = "0.3"
os_pipe = "1"
strip-ansi-escapes = "0.2"
strum = "0.27"
strum_macros = "0.27"
convert_case = "0.6"
sqlx = "0.8"
shlex = "1.3"
sha2 = "0.10"
derivative = "2.2"
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls-webpki-roots-no-provider"] }
eventsource-stream = "0.2"
walkdir = "2"
rand = "0.8"
base64 = "0.22"
lru = "0.12"
jsonc-parser = { version = "0.29", features = ["cst", "serde"] }
bon = "3"

# External dependencies (non-Android only - codex requires OpenSSL which doesn't cross-compile to Android)
[target.'cfg(not(target_os = "android"))'.dependencies]
agent-client-protocol = { version = "0.8", features = ["unstable"] }
codex-protocol = { git = "https://github.com/openai/codex.git", package = "codex-protocol", tag = "rust-v0.101.0" }
codex-app-server-protocol = { git = "https://github.com/openai/codex.git", package = "codex-app-server-protocol", tag = "rust-v0.101.0" }
codex-core = { git = "https://github.com/openai/codex.git", package = "codex-core", tag = "rust-v0.101.0" }

[target.'cfg(windows)'.dependencies]
winsplit = "0.1"

[features]
default = []
qa-mode = []

[profile.release]
debug = 1
split-debuginfo = "packed"
strip = true

# Patches for codex-core's forked tokio-tungstenite with proxy support
[patch.crates-io]
tokio-tungstenite = { git = "https://github.com/openai-oss-forks/tokio-tungstenite", rev = "132f5b39c862e3a970f731d709608b3e6276d5f6" }
tungstenite = { git = "https://github.com/openai-oss-forks/tungstenite-rs", rev = "9200079d3b54a1ff51072e24d81fd354f085156f" }
